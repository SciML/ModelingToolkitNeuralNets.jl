name: Downgrade
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    name: "Downgrade"
    strategy:
      matrix:
        group:
          - Core
        julia-version: ['1.10']
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      allow-reresolve: true
      julia-version: "${{ matrix.julia-version }}"
      group: "${{ matrix.group }}"
      skip: "Pkg,TOML"
    secrets: "inherit"
